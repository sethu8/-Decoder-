<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Message Decoder</title>
    <link rel="stylesheet" href="style.css">

    <!-- Vintage Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<div class="scroll">

    <h1>🕵 Secret Message Decoder 🕵</h1>

    <p class="instruction">
        Enter the secret message below.
        <br><br>
        The decoder automatically finds the number of letters
        in the first hidden word and shifts every alphabet
        backwards by that number.
    </p>

    <textarea
            id="secret"
            placeholder="Enter Secret Code"></textarea>

    <br>

    <button onclick="decodeMessage()">
        Decode Message
    </button>

    <h2>Decoded Message</h2>

    <textarea id="result" readonly></textarea>

</div>

<script>

async function decodeMessage(){

    let message=document.getElementById("secret").value;

    let response=await fetch("http://localhost:8080/decode",{

        method:"POST",

        headers:{
            "Content-Type":"text/plain"
        },

        body:message

    });

    let result=await response.text();

    document.getElementById("result").value=result;

}

</script>

</body>
</html>
